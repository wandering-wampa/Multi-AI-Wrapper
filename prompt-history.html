<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'none'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self';">
  <title>Prompt History</title>
  <style>
    :root {
      --bg: #121212;
      --panel: #171717;
      --panel-2: #1f1f1f;
      --fg: #f3f4f6;
      --muted: rgba(243, 244, 246, 0.64);
      --border: rgba(255, 255, 255, 0.1);
      --hover: rgba(255, 255, 255, 0.06);
      --accent: rgba(245, 158, 11, 0.82);
      --accent-soft: rgba(245, 158, 11, 0.14);
    }

    html[data-theme="light"] {
      --bg: #f7f7f8;
      --panel: #ffffff;
      --panel-2: #f3f4f6;
      --fg: #111827;
      --muted: rgba(17, 24, 39, 0.58);
      --border: rgba(17, 24, 39, 0.1);
      --hover: rgba(17, 24, 39, 0.05);
      --accent: rgba(217, 119, 6, 0.92);
      --accent-soft: rgba(245, 158, 11, 0.12);
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: transparent;
      color: var(--fg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    body {
      padding: 12px;
      box-sizing: border-box;
      background: var(--bg);
    }

    .history-shell {
      height: 100%;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, var(--panel), var(--bg));
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
    }

    .history-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .history-subtitle {
      margin-top: 3px;
      font-size: 12px;
      color: var(--muted);
    }

    .history-clear {
      height: 30px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      font-weight: 600;
    }

    .history-clear:hover:enabled {
      color: var(--fg);
      border-color: rgba(245, 158, 11, 0.55);
      background: var(--accent-soft);
    }

    .history-clear:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .history-list {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--panel-2);
      color: inherit;
      cursor: pointer;
      text-align: left;
      box-sizing: border-box;
    }

    .history-item:hover {
      background: var(--hover);
      border-color: rgba(245, 158, 11, 0.32);
    }

    .history-item-main {
      flex: 1 1 auto;
      min-width: 0;
    }

    .history-item-preview {
      font-size: 13px;
      line-height: 1.45;
      word-break: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .history-item-meta {
      margin-top: 8px;
      font-size: 11px;
      color: var(--muted);
    }

    .history-item-remove {
      width: 26px;
      height: 26px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font: inherit;
      font-size: 12px;
      line-height: 1;
      flex: 0 0 auto;
    }

    .history-item-remove:hover {
      color: var(--fg);
      border-color: rgba(239, 68, 68, 0.45);
      background: rgba(239, 68, 68, 0.12);
    }

    .history-empty {
      margin: auto 0;
      padding: 24px 18px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="history-shell">
    <div class="history-header">
      <div>
        <div class="history-title">Prompt History</div>
        <div class="history-subtitle">Recent shared prompts for compare mode</div>
      </div>
      <button id="history-clear-button" class="history-clear" type="button">Clear</button>
    </div>

    <div id="history-list" class="history-list"></div>
  </div>

  <script src="prompt-history.js"></script>
</body>
</html>
