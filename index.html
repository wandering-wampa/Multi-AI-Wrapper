<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'none'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self';">
  <title>Multi-AI-Wrapper</title>


  <style>
    /* ----------------------------------------------------------------
       Design tokens (handoff: Multi-Ai-Wrapper wrapper chrome)
       Dark is default; light is applied via html[data-theme="light"].
       ---------------------------------------------------------------- */
    :root {
      --win: #0a0a0b;
      --title: #161618;
      --tab: #0f0f11;
      --text: #e9e9ea;
      --muted: #8b8b90;
      --border: rgba(255, 255, 255, 0.09);
      --panel: #1b1b1d;
      --hover: rgba(255, 255, 255, 0.07);
      --selected: rgba(255, 255, 255, 0.06);
      --selected-border: rgba(255, 255, 255, 0.18);

      --accent: #2f6fed;
      --accent-strong: #5b9bff;
      --accent-soft: rgba(47, 111, 237, 0.16);
      --green: #3fbf7f;
      --close-red: #e81123;

      --composer-input-bg: #151517;
      --titlebar-height: 36px;
      --appbar-height: 56px;
    }

    html[data-theme="light"] {
      --win: #cfd0d6;
      --title: #e7e7ea;
      --tab: #f2f2f4;
      --text: #1c1c1f;
      --muted: #65656b;
      --border: rgba(0, 0, 0, 0.12);
      --panel: #ffffff;
      --hover: rgba(0, 0, 0, 0.05);
      --selected: rgba(0, 0, 0, 0.05);
      --selected-border: rgba(0, 0, 0, 0.18);

      --composer-input-bg: #ffffff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: var(--win);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }

    /* ----------------------------------------------------------------
       Title bar (36px) — custom Windows chrome
       ---------------------------------------------------------------- */
    #title-bar {
      height: var(--titlebar-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--title);
      border-bottom: 1px solid var(--border);
      user-select: none;
      -webkit-app-region: drag;
    }

    .titlebar-brand {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 0 12px;
      height: 100%;
      min-width: 0;
    }

    .brand-mark {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: 6px 6px;
      grid-template-rows: 6px 6px;
      gap: 2px;
    }

    .brand-mark span {
      width: 6px;
      height: 6px;
      border-radius: 2px;
    }

    .brand-mark span:nth-child(1) { background: #20b8a8; }
    .brand-mark span:nth-child(2) { background: #d97757; }
    .brand-mark span:nth-child(3) { background: #19c37d; }
    .brand-mark span:nth-child(4) { background: #4285f4; }

    .titlebar-title {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .window-controls {
      display: flex;
      align-items: stretch;
      height: 100%;
      -webkit-app-region: no-drag;
    }

    .window-control {
      width: 46px;
      height: var(--titlebar-height);
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .window-control:hover {
      background: var(--hover);
      color: var(--text);
    }

    .window-control.close:hover {
      background: var(--close-red);
      color: #fff;
    }

    .window-control svg { display: block; }

    .window-control .ico-restore { display: none; }
    body[data-window-maximized="true"] .window-control.maximize .ico-maximize { display: none; }
    body[data-window-maximized="true"] .window-control.maximize .ico-restore { display: block; }

    /* ----------------------------------------------------------------
       App bar (56px) — provider tabs + view toggle + settings
       ---------------------------------------------------------------- */
    #app-bar {
      position: relative;
      height: var(--appbar-height);
      display: flex;
      align-items: center;
      background: var(--tab);
      border-bottom: 1px solid var(--border);
      padding: 0 14px;
      gap: 10px;
      -webkit-app-region: no-drag;
    }

    #nav-strip {
      flex: 1 1 auto;
      min-width: 0;
      height: 100%;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    #tabs {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 100%;
      flex: 1 1 auto;
      overflow-x: auto;
      scrollbar-width: thin;
    }

    /* Keep tabs clear of the absolutely-positioned actions cluster. */
    body[data-layout-mode="tabs"] #tabs {
      padding-right: 196px;
    }

    body[data-layout-mode="compare"] #tabs {
      display: none;
    }

    .tab-button {
      position: relative;
      height: 34px;
      padding: 0 14px;
      border-radius: 9px;
      border: 1px solid transparent;
      background: transparent;
      cursor: pointer;
      color: var(--muted);
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      flex: 0 0 auto;
      user-select: none;
    }

    .tab-button:hover {
      background: var(--hover);
    }

    .tab-button.active {
      border-color: var(--selected-border);
      background: var(--selected);
      color: var(--text);
      font-weight: 600;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #666;
      opacity: 0.4;
      flex: 0 0 auto;
      transition: opacity 0.15s ease;
    }

    .tab-button.active .status-dot { opacity: 1; }

    .status-dot.loading {
      animation: dot-pulse 1s ease-in-out infinite;
    }

    @keyframes dot-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    /* Actions cluster — pinned right so nav-strip can span full width. */
    #top-bar-actions {
      position: absolute;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      -webkit-app-region: no-drag;
      z-index: 4;
    }

    .view-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0;
      background: var(--win);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 3px;
    }

    .view-segment {
      height: 28px;
      padding: 0 14px;
      border: none;
      background: transparent;
      border-radius: 7px;
      cursor: pointer;
      color: var(--muted);
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .view-segment:hover { color: var(--text); }

    .view-segment.active {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
      font-weight: 600;
    }

    html[data-theme="light"] .view-segment.active {
      background: rgba(0, 0, 0, 0.08);
    }

    .view-segment svg { display: block; }

    .icon-button {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: no-drag;
      user-select: none;
    }

    .icon-button:hover {
      background: var(--hover);
      color: var(--text);
    }

    .icon-button svg { display: block; }

    /* ----------------------------------------------------------------
       Compare pane headers (occupies the nav strip in compare mode)
       ---------------------------------------------------------------- */
    #compare-pane-headers {
      height: 100%;
      flex: 1 1 auto;
      width: 100%;
      min-width: 0;
      display: none;
      grid-template-columns: repeat(1, minmax(0, 1fr));
      -webkit-app-region: no-drag;
    }

    body[data-layout-mode="compare"] #compare-pane-headers {
      display: grid;
    }

    .compare-pane-header {
      min-width: 0;
      display: flex;
      align-items: center;
      border-right: 1px solid var(--border);
      min-height: 0;
    }

    .compare-pane-header:last-child {
      border-right: none;
    }

    .compare-pane-chip {
      width: 100%;
      min-width: 0;
      height: 38px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 0 12px;
      border-radius: 9px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      cursor: default;
      font: inherit;
      font-size: 14px;
      font-weight: 600;
    }

    .compare-pane-chip.active {
      background: var(--selected);
      border-color: var(--selected-border);
    }

    .compare-pane-label {
      flex: 1 1 auto;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .compare-pane-badge {
      flex: 0 0 auto;
      padding: 2px 6px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .compare-pane-badge[hidden] { display: none; }

    .compare-pane-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
    }

    .compare-pane-action {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font: inherit;
      font-size: 13px;
      line-height: 1;
      flex: 0 0 auto;
    }

    .compare-pane-action:hover {
      background: var(--hover);
      color: var(--text);
    }

    .compare-pane-action:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .compare-pane-action:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    /* ----------------------------------------------------------------
       Compare unified composer (bottom, compare mode only)
       ---------------------------------------------------------------- */
    #compare-composer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      display: none;
      padding: 14px 18px 10px;
      background: var(--tab);
      border-top: 1px solid var(--border);
      z-index: 20;
    }

    body[data-layout-mode="compare"] #compare-composer {
      display: block;
    }

    .compare-composer-inner {
      max-width: 1120px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 12px;
      align-items: stretch;
    }

    .compare-composer-main {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }

    .compare-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 11px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .compare-attachments {
      display: none;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .compare-attachments.has-items {
      display: flex;
    }

    .compare-attachment-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      max-width: 260px;
      padding: 6px 8px 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--hover);
      color: var(--text);
      font-size: 12px;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .compare-attachment-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .compare-attachment-remove {
      width: 18px;
      height: 18px;
      border: none;
      border-radius: 999px;
      background: var(--hover);
      color: var(--muted);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font: inherit;
      font-size: 12px;
      line-height: 1;
      flex: 0 0 auto;
    }

    .compare-attachment-remove:hover {
      background: rgba(232, 17, 35, 0.18);
      color: var(--text);
    }

    #compare-prompt-input {
      width: 100%;
      min-height: 64px;
      resize: none;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--composer-input-bg);
      color: var(--text);
      padding: 11px 12px;
      font: inherit;
      font-size: 15px;
      line-height: 1.5;
      outline: none;
    }

    #compare-prompt-input::placeholder { color: var(--muted); }

    #compare-prompt-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-soft);
    }

    .compare-composer-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 40px;
      padding-left: 2px;
    }

    .compare-composer-side {
      display: flex;
      flex-direction: column;
      gap: 8px;
      justify-content: flex-start;
    }

    .compare-composer-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: stretch;
      gap: 10px;
    }

    .compare-history-button,
    .compare-attach-button,
    .compare-file-button,
    .compare-new-chat-button {
      width: 42px;
      min-width: 42px;
      height: 42px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .compare-history-button:hover,
    .compare-attach-button:hover,
    .compare-file-button:hover,
    .compare-new-chat-button:hover {
      background: var(--hover);
      color: var(--text);
    }

    .compare-history-button.active,
    .compare-attach-button.has-items,
    .compare-file-button.has-items {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent-strong);
    }

    .compare-history-button svg,
    .compare-attach-button svg,
    .compare-file-button svg,
    .compare-new-chat-button svg {
      width: 16px;
      height: 16px;
      display: block;
    }

    .composer-send-button {
      height: 42px;
      flex: 1 1 auto;
      border-radius: 9px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-weight: 600;
    }

    .composer-send-button:hover {
      background: #3b78f0;
      border-color: #3b78f0;
    }

    .composer-send-button:disabled,
    .compare-attach-button:disabled,
    .compare-file-button:disabled,
    .compare-history-button:disabled,
    .compare-new-chat-button:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    .compare-results {
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 0;
    }

    .compare-results.has-items { display: flex; }

    .compare-result-chip {
      padding: 4px 7px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--hover);
      color: var(--muted);
      font-size: 11px;
      line-height: 1;
      white-space: nowrap;
    }

    .compare-result-chip.ok {
      border-color: rgba(63, 191, 127, 0.4);
      color: #6fdca6;
    }

    .compare-result-chip.manual {
      border-color: rgba(91, 155, 255, 0.42);
      color: var(--accent-strong);
    }

    .compare-result-chip.failed {
      border-color: rgba(232, 17, 35, 0.42);
      color: #ff8a8a;
    }

    .compare-status {
      min-height: 18px;
      font-size: 12px;
      color: var(--text);
      opacity: 0.78;
      line-height: 1.35;
    }

    .compare-hint {
      font-size: 11.5px;
      color: var(--muted);
      line-height: 1.35;
    }

    /* ----------------------------------------------------------------
       First-run setup overlay
       ---------------------------------------------------------------- */
    .setup-overlay {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.55);
      padding: 24px;
      -webkit-app-region: no-drag;
    }

    .setup-overlay[hidden] { display: none; }

    .setup-panel {
      width: min(520px, 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--panel);
      color: var(--text);
      padding: 24px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
    }

    .setup-panel h1 {
      margin: 0 0 8px;
      font-size: 21px;
      font-weight: 700;
      line-height: 1.2;
    }

    .setup-panel p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .setup-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .setup-action {
      height: 36px;
      padding: 0 16px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      font-weight: 600;
    }

    .setup-action:hover { background: var(--hover); }

    .setup-action.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .setup-action.primary:hover { background: #3b78f0; }

    @media (max-width: 840px) {
      .compare-composer-inner {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body data-window-maximized="false">
  <div id="header-shell">
    <div id="title-bar">
      <div class="titlebar-brand">
        <span class="brand-mark" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </span>
        <span class="titlebar-title">Multi-AI-Wrapper</span>
      </div>
      <div class="window-controls">
        <button id="window-minimize" class="window-control minimize" type="button" title="Minimize" aria-label="Minimize">
          <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true">
            <path d="M1 5h8" stroke="currentColor" stroke-width="1" stroke-linecap="round"></path>
          </svg>
        </button>
        <button id="window-maximize" class="window-control maximize" type="button" title="Maximize" aria-label="Maximize">
          <svg class="ico-maximize" width="10" height="10" viewBox="0 0 10 10" aria-hidden="true">
            <rect x="0.75" y="0.75" width="8.5" height="8.5" rx="1.5" fill="none" stroke="currentColor" stroke-width="1"></rect>
          </svg>
          <svg class="ico-restore" width="10" height="10" viewBox="0 0 10 10" aria-hidden="true">
            <rect x="0.75" y="2.5" width="6.75" height="6.75" rx="1.3" fill="none" stroke="currentColor" stroke-width="1"></rect>
            <path d="M3 2.5V1.6a1 1 0 0 1 1-1h4.4a1 1 0 0 1 1 1V6a1 1 0 0 1-1 1h-.9" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </button>
        <button id="window-close" class="window-control close" type="button" title="Close" aria-label="Close">
          <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true">
            <path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1" stroke-linecap="round"></path>
          </svg>
        </button>
      </div>
    </div>

    <div id="app-bar">
      <div id="nav-strip">
        <div id="tabs"></div>
        <div id="compare-pane-headers" aria-hidden="true"></div>
      </div>
      <div id="top-bar-actions">
        <div id="view-toggle" class="view-toggle" role="group" aria-label="View mode">
          <button class="view-segment active" data-mode="single" type="button" aria-pressed="true" title="Single view">
            <svg width="15" height="14" viewBox="0 0 15 14" aria-hidden="true">
              <rect x="2" y="2" width="11" height="10" rx="1.6" fill="none" stroke="currentColor" stroke-width="1.4"></rect>
            </svg>
            <span class="view-segment-label">Single</span>
          </button>
          <button class="view-segment" data-mode="compare" type="button" aria-pressed="false" title="Compare view">
            <svg width="15" height="14" viewBox="0 0 15 14" aria-hidden="true">
              <rect x="1.5" y="2" width="5" height="10" rx="1.4" fill="none" stroke="currentColor" stroke-width="1.4"></rect>
              <rect x="8.5" y="2" width="5" height="10" rx="1.4" fill="none" stroke="currentColor" stroke-width="1.4"></rect>
            </svg>
            <span class="view-segment-label">Compare</span>
          </button>
        </div>
        <button id="settings-button" class="icon-button" title="Settings" aria-label="Settings">
          <svg width="17" height="17" viewBox="0 0 17 17" aria-hidden="true">
            <circle cx="8.5" cy="8.5" r="2.4" fill="none" stroke="currentColor" stroke-width="1.3"></circle>
            <path d="M8.5 1.4v1.7M8.5 13.9v1.7M1.4 8.5h1.7M13.9 8.5h1.7M3.5 3.5l1.2 1.2M12.3 12.3l1.2 1.2M13.5 3.5l-1.2 1.2M4.7 12.3l-1.2 1.2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div id="compare-composer" aria-hidden="true">
    <div class="compare-composer-inner">
      <div class="compare-composer-main">
        <div class="compare-card">
          <div id="compare-attachments" class="compare-attachments" aria-live="polite"></div>
          <textarea id="compare-prompt-input" placeholder="Send a prompt to all visible models" spellcheck="true"></textarea>
        </div>
        <div class="compare-composer-meta">
          <div id="compare-results" class="compare-results" aria-live="polite"></div>
          <div id="compare-status" class="compare-status"></div>
          <div class="compare-hint">Enter sends ready panes. Custom panes stay manual-only. Images are staged for manual submit.</div>
        </div>
      </div>

      <div class="compare-composer-side">
        <div class="compare-composer-actions">
          <button id="compare-attach-button" class="compare-attach-button" type="button" title="Attach images" aria-label="Attach images">
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path d="M3 12.5V4.8A2.8 2.8 0 0 1 5.8 2h4.4A2.8 2.8 0 0 1 13 4.8v6.4a2.8 2.8 0 0 1-2.8 2.8H5.3A2.3 2.3 0 0 1 3 11.7V6.2a1.7 1.7 0 0 1 3.4 0v4.7a1.1 1.1 0 0 0 2.2 0V5.7" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </button>
          <button id="compare-file-button" class="compare-file-button" type="button" title="Attach files" aria-label="Attach files">
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path d="M4.5 1.8h4.4L12.8 5.7v8.5H4.5z" fill="none" stroke="currentColor" stroke-width="1.35" stroke-linejoin="round"></path>
              <path d="M8.9 1.8v4h3.9" fill="none" stroke="currentColor" stroke-width="1.35" stroke-linejoin="round"></path>
            </svg>
          </button>
          <button id="compare-new-chat-button" class="compare-new-chat-button" type="button" title="New chat in visible panes" aria-label="New chat in visible panes">
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path d="M8 2.2v11.6M2.2 8h11.6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></path>
            </svg>
          </button>
          <button id="compare-history-button" class="compare-history-button" type="button" title="Prompt history" aria-label="Prompt history" aria-expanded="false">
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path d="M8 1.5a6.5 6.5 0 1 0 6.2 8.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
              <path d="M8 4.2v4l2.6 1.6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
              <path d="M11.8 1.9h2.7v2.7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </button>
          <button id="compare-send-button" class="composer-send-button" type="button">Send</button>
        </div>
      </div>
    </div>
  </div>

  <div id="setup-overlay" class="setup-overlay" aria-hidden="true" hidden>
    <div class="setup-panel" role="dialog" aria-modal="true" aria-labelledby="setup-title">
      <h1 id="setup-title">Set up Multi-AI-Wrapper</h1>
      <p>All built-in providers are enabled for first run. Sign in inside each pane, then use compare view to send to ready panes while custom tabs remain manual-only.</p>
      <div class="setup-actions">
        <button id="setup-settings-button" class="setup-action" type="button">Settings</button>
        <button id="setup-start-button" class="setup-action primary" type="button">Start</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
